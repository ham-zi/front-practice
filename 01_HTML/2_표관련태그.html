<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2_표만들기</title>

    <style>
        table {
            border : 1px solid green;
            ;
        }

    </style>

</head>
<body>
    




        <br><br><br><br><br><br><br><br><br><br>
        <!-- 게시글 표
            표(table) : row + cell로 구성됨
            많은 데이터를 정리해서 표현하고자 할 때 사용

            표를 구성하는 요소 :
                <table> : 표를 하나 만들어주는 요소
                <tr> : 한 행을 나타내는 요소,
                <td> : 일반 셀을 타나내는 요소
                <th> : 열의 제목셀을 나타내는 요소
                    
                + <thread>, <tbody>, <tfoot> (표의 구역을 나누는 요소)
        -->
        <table>
            <tr>
                <th colspan="2">제목</th>
                <th>작성자</th>
                <th>작성일</th>
                <th>조회수</th>
                <th>좋아요</th>
            </tr>
                <td>1128401313</td>
                <td>버버리 프레야 캔버스 토트백 미디움</td>
                <td>iawefawefawef</td>
                <td>12:22</td>
                <td>0</td>
                <td>0</td>
            <tr>
                <td>1218401312</td>
                <td>여성백팩</td>
                <td>그랑블루1196</td>
                <td>12:21</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>12151515</td>
                <td>이셰이미야케</td>
                <td>이다산</td>
                <td>12:10</td>
                <td>1</td>
                <td>44</td>
            </tr>
        </table>

         
</body>
</html>
