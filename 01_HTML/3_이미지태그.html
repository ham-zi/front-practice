    <!--
        <img src="이미지의 경로(필수)" 
             alt="이미지에 대한 설명(필수)" :
             -> 사진의 경로가 존재하지 않거나 표현할수 없을때 대체 텍스트/ 스크린리더가 이미지읽어주는 설명문구
             width="150"
             height="150" />

            요소의 가로, 세로길이 조절하는 속성
            고정길이(px), 가변길이(%)로 기정이 가능하다.

            기본단위 == px 
            고정길이 특징 : 부모요소의 크기가 바뀌더라도 크기 변동이 일어나지 않음
            가변길이 단위 :
            
            VSCode 자주 쓰는 단축키
            행 이동 : art + 방향키
            행 복사 : alt + Shift + 방향키
            행 삭제 : Ctrl + x(잘라내기)



            오디오/비디오
            <audio src=""></audio>
            src : 미디어파일 및 오디오파일의 경로
            autoplay : 자동재생
            loop : 반복을 할지 말지
            post : 섬네일 이미지를 저장
    -->
