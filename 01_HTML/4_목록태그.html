<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록을 만들자</title>
</head>
<body>
    
    <!--
        <li> : 기본적인 목록을 만드는 태그
        <ul> : unordered list : 순서가 없는 목록을 만드는 태그
            -> bullet 기호 : 채워진 원, 빈원 등//
            ->  보통 없애서 사용


            
        <ol> : ordered list :순서가 있는 목록을 사용할 때 쓰는 태그</ol>
        <dl> : description list : 설명이 필요한 목록을 만들 때 쓰는 태그
    
    -->

    <li>Java</li>
    <li>SQL</li>
    <li>JDBC</li>
    <li>myBatis</li>


    <ul>
        <li>HTML</li>
            <ul>
                <li>글자관련태그</li>
                <li>목록태그</li>
            </ul>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>   

    <ol>
        <li>목록</li>
        <li>목록</li>
        <li>목록</li>
    </ol>

    <br><br><br><br><br><br><br><br><br><br>
</body>
</html>
