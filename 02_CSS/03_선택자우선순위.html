<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선택자 우선순위</title>
    <style >
        #id1{
            background-color: brown;
        }
        h1{
            color: aliceblue;
            background-color: aqua;
        }

        h1{
            color:aquamarine;
        }

        .class1 {
            background-color: darkkhaki;
            color : rgb(1, 1, 3);
        }

        h1{
            color:aqua !important
        }
    </style>
</head>
<body>
    

    <h1 id="id1" class="class1">선택자 우선 순위</h1>

    <pre>
        기본적으로 css는 스타일이 위에서부터 아래로 반영이 된다.
        동일한 선택자를 이용해서 스타일을 부여하면
        하단에 위치한 스타일속성이 적용
        다양한 선택자를 이용해서 스타일을 부여하면
        우선순위에 따라 적용
    </pre>
        !important*실무...어쩔수없을 때 사용* > 인라인스타일 방식*최악* > 아이디 선택자 > 클래스 선택자 > 태그 선택자 >


</body>
</html>
