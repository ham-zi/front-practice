<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구조잡기연습2</title>

    <!-- 큰거에서 작은거로 잡아줌 
    display -> flex-direction -> 길이 flex3,4 
    알아서 width는 잡아줌 
    -->
    <style>

        div, header, main, footer {
            border : 1px solid red;
            box-sizing : border-box;
        }

        #wrap {
            width : 1000px;
            height : 800px;
            margin : auto;
            display : flex;
            flex-direction :column;
        }

        header, footer {
            flex : 3;
        }

        main {
            flex :4;
        }





    </style>

</head>

<body>

    <div id="wrap">
        <header></header>
        <main></main>
        <footer></footer>
    </div>
    
</body>
</html>
