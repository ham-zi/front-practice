<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        div,form {
            box-sizing: border-box;
        }
        #header_2{
            width: 650px;
            height : 160px;
            border : 1px solid red;
        }
        
        /*--------------------*/
        #header_2{
            display : flex;
            align-items: center;
            justify-content: center;
        }
        
        #search_form{
            width : 85%;
            height : 40px;
            padding : 4px;
            border-radius: 15px;
            background-color: rgb(255, 240, 240);
            display :flex;
        }
        
        #search_text{
            flex: 8;
        }

        #search_btn{
            flex: 2;
        }
        
        #search_text > input{
            width : 100%;
            height : 100%;
            border-radius: 10px;
            border : none;
            box-sizing: border-box;
            background-color: rgb(255, 255, 255);
            &:focus{
                outline: rgb(252, 220, 220);
            }
        }

        #search_btn > button {
            width: 95%;
            height: 100%;
            border-radius: 22px;
            background-color: rgb(58, 46, 46);
            color : rgb(252, 220, 220);
            &:hover {
                color: #1a1a1a;
                cursor:pointer;
            }
        }
        
        </style>
</head>

<body>
    <div id="header_2">
        <form action="search" method="get" id="search_form">
            <div id="search_text">
                <input type="text" name="query" placeholder="검색어를 입력">
            </div>
            <div id="search_btn">
                <button>검색하기</button>
            </div>
        </form>
    </div>
        
</body>
</html>
