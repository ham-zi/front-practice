<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
        nav{
            border : 1px solid red;
            width: 1000px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav{
            background-color: rgb(255, 245, 245);
        }
        
        nav > ul {
            display:flex;
        }
        
        nav > ul > li {
            list-style: none;
            border-right : 1px solid rgb(187, 187, 187);
            padding : 2px 20px;
        }
        
        ul > :last-child {
            border-right : 0px;
        }
        
        nav > ul > li > a {
            text-decoration: none;
            color: rgb(34, 34, 34);

            &:hover{
                font-weight: 600;
                color :black
            }
        }


    </style>


</head>


<body>

    <nav>
        <ul id="navbar">
            <li><a href="#">인기</a></li>
            <li><a href="#">제철</a></li>
            <li><a href="#">과일</a></li>
            <li><a href="#">채소</a></li>
            <li><a href="#">축산</a></li>
            <li><a href="#">양봉</a></li>
        </ul>
    </nav>

    
</body>
</html>
