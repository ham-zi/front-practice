    <script>
        function addEl() {
            const array1 = [];          //빈 배열 선언하는 방법. : 권장방법
            const array2 = new Array(); //생성자 함수           : 알아만두자...
            console.log(array1);
            console.log(array2);


            array1[0] = '당근'; // 인덱스에 추가
            array1.push('사과'); // 가장 뒤에 추가 (대부분:사용자에게 입력받을 때)
            array1.unshift('망고'); //가장 앞에 추가
            array1.push('수박');
            array1.unshift('복숭아');

            const num = parseInt(Math.random() * array1.length);
            alert(`오늘의 점심 메뉴는 ${array1[num]}입니다.`)
            alert(array1.pop()); // 가장 앞에 제거 및 반환
            alert(array1.shift()); // 가장 뒤에 제거 및 반환
            document.querySelector('#area2').innerHTML = array1;
            
        }

    <button onclick="holiday();">빨간날!</button>

    <script>
        function holiday() {
            const days = ['노동절', '어린이날', '부처님오신날', '크리스마스', '현충일', '3.1절', '식목일'];
            // 빨간날 찾아보기 버튼을 누르면
            // 사용자에게 텍스트를 입력받아서
            // 사용자가 입력한 텍스트가 배열의 요소일 경우
            // area3의 content에 XXX은(는) 빨간날이 맞습니다.
            // 입력한 텍스트가 요소가 아닐 경우
            // area3의 content에 xxx는(는) 빨간날이 아닙니다.
            const day = prompt('어떤날을 찾으시나요?');
            console.log(days.includes(day)); // 이 contains같은!!! 반복없이!~좋다
            console.log(days.indexOf(day)); // 존재하면 인덱스, 없으면 -1 리턴

            const str = days.includes(day) ? '맞습니다' : '아닙니다.';

            document.querySelector('#area3').innerHTML =
            `${day}은(는) 빨간날이 ${str}`;

        }

        

    </script>

    <h3>모던 자바스크립트 문법</h3>

    <button onclick="remember();">알아두면 좋은 문법</button>


    <script>
        function remember() {
            //1. 자바스크립트에서 동등비교
            console.log('1'== '1'); // true
            console.log( 1 == '1'); // true
            console.log([] == 0); //true
            //그래서 동등비교할때 == 를 잘 안쓴다.

            console.log('1'=== 1); // 값과 자료형이 일치해야만 true값이 나온다. (권장사항)

            const fruits = ['Apple', 'Banana', 'Cherry'];
            // 2. 배열을 각 변수에 할당
            //  이것을 편하게 하는 문법이 있다
            const e1 = fruits[0];
            const e2 = fruits[1];
            const e3 = fruits[2];
            console.log(e1,e2,e3);
            // => 한번에 초기화
            const [f1, f2, f3] = fruits;
            console.log(e1,e2,e3);

            // 3. 원본배열+a => 새로운 배열
            const fruit = ['Durian'];
            //const array = fruits.concat(fruit);
            //console.log(array); 옛날 문법
            // 깊은 복사 같은 문법이다. spread [...배열]
            const str = [...fruits, ...fruit, 'E']; // 모던문법
            console.log(str);


            // 4. map은 내가 원하는 형태로 '변환'을 해줌
            const nums = [1,2,3,4,5];
            //const nums2 = nums.map(function(e){
            //    return e+1;
            //})
            const nums2 = nums.map(e => e+1);            
            console.log(nums2);

            // 5. filter는 필터링하는 문법
            const filters = nums.filter(e => e % 2 != 0).map(e => e+1);
            console.log(filters);

            // join 문자열로 합치는 문법

        };
    </script>



    <div id="area4" class="area small"></div>
    <button onclick="sort();">정렬</button>

    <script>
        function sort(){
            const arr = ['Banana', 'Lemon', 'Apple', '수박', '망고', '望']
            const area = document.querySelector('#area4');
            arr.sort();
            area.innerHTML = `${arr} <br>`;
            arr.reverse();
            area.innerHTML = `${arr} <br>`;

            // 영어만 받고싶다
            // slice(begin, end) : 배열의 요소를 추출해줌
            area.innerHTML += `${arr.slice(4,6)}<br>`;
            // splice 배열의 요소 변경
            area.innerHTML += `${arr.splice(1,1, '수박박')}<br>`
            area.innerHTML += `${arr}<br>`
            // 배열을 없애는 메서드가 존재하지 않기 떄문에 splice를 사용해서 없애야한다.
            // (3,2) 3에서부터 2개 삭제
            area.innerHTML += `${arr.splice(3,2)}<br>`
            area.innerHTML += `${arr}<br>`
        }


    </script>



    <h4> join() : 배열에 담긴 요소를 하나의 string타입으로 합쳐주는 메소드 </h4>


    <div id="area5" class="area small"></div>
    <button onclick="join()">버튼</button>

    <script>
        function join() {
            const area = document.querySelector('#area5');

            const arr = ['홍삼', '인삼', '염소', '송이버섯', '비타민C'];

            const str = arr.map(e => `이름: ${e}<br>`).join(""); // , 이 들어가서 안 이쁨
                                                               // join("")을 넣으면 깔끔해짐
            area.innerHTML += str;
            //출력 형식 변경
            // 이름 : 홍길동
            // 이름 : 고길동 
            console.log(str);






            const obj = {
                과일 : "사과"
            };

            area.innerHTML += obj.toString();
            //println(참조자료형.toString())
            area.innerHTML += arr.toString();


        }
    </script>
