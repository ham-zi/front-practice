<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>

        #div1{
            width : 100%;
            margin: 30px 0px;
            align-items: center;
        }

        button{
            border-radius: 20px;
            width : 1000px;
            background-color: rgb(255, 247, 236);

            &:hover {
                background-color: rgb(255, 219, 171);
            }
        }

    </style>
</head>
<body>
    <div id="div1">
        <button onclick="next();"> 강북구 학교 정보 </button>
    </div>
    
    <table class="table table-dark table-striped">

        <thead>
            <tr>
                <th>시도교육청</th>
                <th>지역</th>
                <th>학교명</th>
                <th>학생수계</th>
            </tr>
        </thead>

        <tbody id="tbody1">

        </tbody>
    </table>


    <script>
        let startNum = 1;
        let endNum = 5;
        function next() {
            school(startNum, endNum);
            startNum += 5;
            endNum += 5;

        }

        function school(startNum, endNum) {

            $.ajax({
                url : `http://openapi.seoul.go.kr:8088/71534a714264646d373971654e5565/json/schoolInfoSchl_gb/${startNum}/${endNum}/`,
                success : e => {
                    const schools = e.schoolInfoSchl_gb.row;
                    const el = schools.map(school =>`
                                                    <tr>
                                                        <th>${school.CTPV_EDUO}</th>
                                                        <th>${school.RGN}</th>
                                                        <th>${school.SCHL_NM}</th>
                                                        <th>${school.STDNT_CNT_SUM}</th>
                                                    <tr>`)
                                      .join('');
                    document.querySelector('#tbody1').innerHTML = el;
                }
            });

        }

    </script>

    <!--
    
    -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
